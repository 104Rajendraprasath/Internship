<template>
    <!-- THE WRAPPER: slds-card_boundary creates the single outer border -->
    <article class="slds-card slds-card_boundary">
        
       
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="custom:custom19" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
    <!-- Using the standard 'a' tag and header-link class matches the standard font weight and color exactly -->
                    <a class="slds-card__header-link slds-truncate" title="Maintenance History">
                    <span>Maintenance History ({logCount})</span>
                    </a>
                    </h2>
                </div>
            </header>
            
            <!-- Header Buttons -->
            <div class="slds-no-flex">
                <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh} class="slds-m-right_x-small"></lightning-button-icon>
                <lightning-button label="New" onclick={openModal}></lightning-button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 2. THE CONTENT (BODY)                      -->
        <!-- ========================================== -->
        <!-- Using slds-card__body without padding so the table touches the edges -->
        <div class="slds-card__body" style="margin-bottom: 0;">
            
            <!-- Spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <!-- Datatable -->
            <lightning-datatable
                key-field="Id"
                data={logs}
                columns={columns}
                hide-checkbox-column="true"
                onrowaction={handleRowAction}>
            </lightning-datatable>
            
        </div>

        <!-- ========================================== -->
        <!-- 3. THE FOOTER                              -->
        <!-- ========================================== -->
        <!-- slds-card__footer anchors the summary securely to the bottom -->
        <footer>

        <div class="slds-theme_shade slds-border_top" style="border-radius: 0 0 0.25rem 0.25rem; padding: 0.75rem 1rem;">
            
            <!-- slds-grid_align-spread forces the 3 items to the far left, middle, and far right without squishing them -->
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                
                <!-- Left-most element -->
                <div class="slds-p-left_none slds-m-left-none">
                    <strong>Total Cost: </strong> 
                    <lightning-formatted-number value={totalCost} format-style="currency"></lightning-formatted-number>
                </div>
                
                <!-- Center element -->
                <div>
                    <strong>Average Cost: </strong> 
                    <lightning-formatted-number value={averageCost} format-style="currency"></lightning-formatted-number>
                </div>
                
                <!-- Right-most element -->
                <div>
                    <strong>Most Recent Service: </strong> 
                    <lightning-formatted-date-time value={recentDate} year="numeric" month="short" day="2-digit"></lightning-formatted-date-time>
                </div>

            </div>
        </div>
        </footer>
    </article>

    <!-- ========================================== -->
    <!-- MODAL POPUP (Hidden outside the main card) -->
    <!-- ========================================== -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">New Maintenance Log</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    
                    <lightning-record-edit-form object-api-name="Maintenance_Log__c" onsuccess={handleSuccess}>
                        <lightning-messages></lightning-messages>
                        
                        <!-- Hidden input linking to Equipment -->
                        <lightning-input-field field-name="Equipment__c" value={recordId} class="slds-hide"></lightning-input-field>
                        
                        <lightning-input-field field-name="Service_Date__c" required></lightning-input-field>
                        <lightning-input-field field-name="Technician__c" required></lightning-input-field>
                        <lightning-input-field field-name="Cost__c"></lightning-input-field>
                        <lightning-input-field field-name="Issue_Description__c"></lightning-input-field>
                        
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_small"></lightning-button>
                            <lightning-button label="Save" variant="brand" type="submit"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                    
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
